name: CI Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Run API tests
        run: npm run test:unit -- --testPathPattern=api

      - name: Run services tests
        run: npm run test:unit -- --testPathPattern=services

      - name: Run components tests
        run: npm run test:unit -- --testPathPattern=components