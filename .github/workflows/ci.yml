


stages:
  - test:unit
   
test:unit:api:
  stage: test:unit
  script:
    - npm install
    - npm run test:unit -- --testPathPattern=api
  parallel:
    matrix:
      - NODE_VERSION: ["18", "20"]
  artifacts:
    reports:
      junit: junit-api.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml

test:unit:services:
  stage: test:unit
  script:
    - npm run test:unit -- --testPathPattern=services
  parallel: 3

test:unit:components:
  stage: test:unit
  script:
    - npm run test:unit -- --testPathPattern=components
  coverage: '/Lines\s*:\s*(\d+\.\d+)%/'







  